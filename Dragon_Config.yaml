behaviors:
  DragonFlight:
    trainer_type: ppo

    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      learning_rate_schedule: linear
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 5
      shared_critic: false

    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 3

    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
      curiosity:
        gamma: 0.99
        strength: 0.02
        learning_rate: 3.0e-4

    keep_checkpoints: 200
    checkpoint_interval: 50000
    max_steps: 1000000
    time_horizon: 2048
    summary_freq: 10000